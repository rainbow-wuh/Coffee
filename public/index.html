<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Coffee Shop Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; padding: 12px; font-size: 14px; overflow-x: hidden; }
        .header { text-align: center; margin-bottom: 12px; }
        .header h1 { color: #e94560; font-size: 1.8rem; font-weight: 700; text-shadow: 0 0 20px rgba(233, 69, 96, 0.5); margin-bottom: 4px; }
        .header p { color: #a0a0a0; font-size: 0.9rem; }
        
        .filter-bar { max-width: 1550px; margin: 0 auto 12px; padding: 10px 15px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .filter-bar span { color: #fff; font-weight: 500; font-size: 0.85rem; }
        .upload-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: #00d9ff; border: none; border-radius: 15px; color: #1a1a2e; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: all 0.3s; }
        .upload-btn:hover { background: #00fff5; }
        .upload-btn input { display: none; }
        .filter-tag { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; background: rgba(233,69,96,0.3); border: 1px solid #e94560; border-radius: 15px; color: #fff; font-size: 0.75rem; cursor: pointer; }
        .filter-tag:hover { background: rgba(233,69,96,0.5); }
        .filter-tag .remove { width: 16px; height: 16px; background: #e94560; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .clear-filters { padding: 6px 12px; background: #6bcb77; border: none; border-radius: 15px; color: #fff; cursor: pointer; font-weight: 500; font-size: 0.8rem; }
        .clear-filters:hover { background: #96e6a1; }
        
        .dashboard { max-width: 1550px; margin: 0 auto; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .bento-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 12px; transition: all 0.3s ease; }
        .bento-box:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .bento-box.filter-active { border-color: #e94560; box-shadow: 0 0 20px rgba(233,69,96,0.4); }
        .bento-box h3 { color: #fff; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; cursor: pointer; position: relative; }
        .bento-box h3 .info-icon { opacity: 0; transition: opacity 0.3s; margin-left: auto; font-size: 0.7rem; }
        .bento-box:hover h3 .info-icon { opacity: 0.7; }
        .bento-box h3 span { font-size: 1rem; }
        
        .kpi-large { grid-column: span 2; background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%); }
        .kpi-large h3 { color: rgba(255,255,255,0.9); }
        .kpi-value { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 3px; }
        .kpi-label { color: rgba(255,255,255,0.8); font-size: 0.75rem; }
        .kpi-change { display: inline-block; margin-top: 6px; padding: 3px 8px; background: rgba(255,255,255,0.2); border-radius: 12px; font-size: 0.7rem; color: #fff; }
        
        .kpi-small { grid-column: span 1; cursor: pointer; }
        .kpi-small:hover { border-color: #00d9ff; }
        .kpi-small .kpi-value { font-size: 1.3rem; }
        .kpi-small .kpi-label { color: #a0a0a0; font-size: 0.7rem; }
        
        .chart-box { grid-column: span 2; min-height: 200px; cursor: pointer; }
        .chart-box:hover { border-color: #00d9ff; }
        .chart-box h3 { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px; }
        .chart-container { height: 160px; position: relative; }
        
        .category-box { grid-column: span 3; cursor: pointer; }
        .category-box:hover { border-color: #00d9ff; }
        
        .top-products { grid-column: span 3; }
        .product-list { display: flex; flex-direction: column; gap: 6px; }
        .product-item { display: flex; align-items: center; gap: 8px; }
        .product-rank { width: 22px; height: 22px; background: linear-gradient(135deg, #e94560, #ff6b6b); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 0.7rem; }
        .product-name { flex: 1; color: #fff; font-size: 0.75rem; }
        .product-qty { color: #00d9ff; font-weight: 600; font-size: 0.75rem; }
        
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
        .progress-fill.pink { background: linear-gradient(90deg, #e94560, #ff6b6b); }
        .progress-fill.blue { background: linear-gradient(90deg, #00d9ff, #00fff5); }
        
        .customer-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
        .cust-card { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; }
        .cust-card:hover { background: rgba(255,255,255,0.1); }
        .cust-card .value { font-size: 1.1rem; font-weight: 700; }
        .cust-card .label { font-size: 0.65rem; color: #a0a0a0; margin-top: 3px; }
        .cust-card.new .value { color: #00d9ff; }
        .cust-card.return .value { color: #ffd93d; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
        .summary-item { display: flex; justify-content: space-between; align-items: center; padding: 6px; background: rgba(255,255,255,0.03); border-radius: 6px; }
        .summary-item .label { color: #a0a0a0; font-size: 0.7rem; }
        .summary-item .value { color: #fff; font-weight: 600; font-size: 0.75rem; }
        
        .box-1 { grid-column: 1 / 3; }
        .box-2 { grid-column: 3 / 4; }
        .box-3 { grid-column: 4 / 5; }
        .box-4 { grid-column: 5 / 6; }
        .box-5 { grid-column: 6 / 7; }
        .box-6 { grid-column: 1 / 3; grid-row: span 2; }
        .box-7 { grid-column: 3 / 5; }
        .box-8 { grid-column: 5 / 7; }
        .box-9 { grid-column: 1 / 4; }
        .box-10 { grid-column: 4 / 7; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 2px solid #e94560; border-radius: 16px; padding: 20px; max-width: 400px; width: 90%; animation: modalIn 0.3s ease; box-shadow: 0 0 40px rgba(233,69,96,0.3); }
        @keyframes modalIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .modal-header h3 { color: #e94560; font-size: 1.1rem; margin: 0; }
        .modal-close { width: 28px; height: 28px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; color: #fff; font-size: 1rem; cursor: pointer; transition: all 0.3s; }
        .modal-close:hover { background: #e94560; }
        .modal-body { color: #fff; }
        .modal-body .label { color: #a0a0a0; font-size: 0.8rem; margin-bottom: 4px; }
        .modal-body .value { font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px; }
        .modal-body .calc { background: rgba(0,217,255,0.1); border: 1px solid rgba(0,217,255,0.3); border-radius: 8px; padding: 10px; font-family: monospace; color: #00d9ff; font-size: 0.85rem; }
        
        @media (max-width: 1200px) {
            .dashboard { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .bento-box { padding: 10px; }
            .kpi-large { grid-column: span 2; }
            .kpi-small { grid-column: span 1; }
            .chart-box { grid-column: span 2; min-height: 180px; }
            .chart-container { height: 140px; }
            .category-box { grid-column: span 3; }
            .top-products { grid-column: span 3; }
        }
        
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr 1fr; }
            .kpi-large { grid-column: span 2; }
            .kpi-small { grid-column: span 1; }
            .chart-box { grid-column: span 2; }
            .category-box { grid-column: span 2; }
            .top-products { grid-column: span 2; }
            .box-6 { grid-row: auto; }
        }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
</head>
<body>
    <div class="header">
        <h1>☕ Coffee Shop Analytics Dashboard</h1>
        <p>Business Intelligence | Productivity & Sales Analysis | Cross-Filtering 🔗</p>
    </div>
    
    <div class="filter-bar">
        <label class="upload-btn">
            📁 Upload Excel
            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" onchange="handleFileUpload(event)">
        </label>
        <span style="margin-left:auto;">🎯 Active Filters:</span>
        <div id="activeFilters" style="display:flex;gap:10px;flex-wrap:wrap;"></div>
        <button class="clear-filters" onclick="clearAllFilters()">Clear All</button>
    </div>
    
    <div class="dashboard">
        <div class="bento-box kpi-large box-1" data-kpi="1" onclick="showKPIModal(1)">
            <h3><span>💰</span> ยอดขายรวม <span class="info-icon">ℹ️</span></h3>
            <div class="kpi-value" id="kpi-revenue">-</div>
            <div class="kpi-label">รายได้ทั้งหมดจากการขาย</div>
            <span class="kpi-change">📈 +12.5% vs last month</span>
        </div>
        
        <div class="bento-box kpi-small box-2" data-kpi="3" onclick="showKPIModal(3)">
            <h3><span>🧾</span> ออร์เดอร์ <span class="info-icon">ℹ️</span></h3>
            <div class="kpi-value" id="kpi-orders">-</div>
            <div class="kpi-label">คำสั่งซื้อทั้งหมด</div>
        </div>
        
        <div class="bento-box kpi-small box-3" data-kpi="2" onclick="showKPIModal(2)">
            <h3><span>📊</span> AOV <span class="info-icon">ℹ️</span></h3>
            <div class="kpi-value" id="kpi-aov">-</div>
            <div class="kpi-label">มูลค่าเฉลี่ยต่อออร์เดอร์</div>
        </div>
        
        <div class="bento-box kpi-small box-4" data-kpi="4" onclick="showKPIModal(4)">
            <h3><span>📦</span> สินค้า <span class="info-icon">ℹ️</span></h3>
            <div class="kpi-value" id="kpi-items">-</div>
            <div class="kpi-label">รายการที่ขายทั้งหมด</div>
        </div>
        
        <div class="bento-box kpi-small box-5" data-kpi="5" onclick="showKPIModal(5)">
            <h3><span>📅</span> ต่อวัน <span class="info-icon">ℹ️</span></h3>
            <div class="kpi-value" id="kpi-daily">-</div>
            <div class="kpi-label">รายได้เฉลี่ยต่อวัน</div>
        </div>
        
        <div class="bento-box chart-box box-6" data-filter="time_slot" onclick="handleFilterClick('time_slot')">
            <h3><span>⏰</span> ยอดขายตามช่วงเวลา (Click) <span class="info-icon">🎯</span></h3>
            <div class="chart-container"><canvas id="timeSlotChart"></canvas></div>
        </div>
        
        <div class="bento-box chart-box box-7" data-filter="channel" onclick="handleFilterClick('channel')">
            <h3><span>🏪</span> ยอดขายตามช่องทาง (Click) <span class="info-icon">🎯</span></h3>
            <div class="chart-container"><canvas id="channelChart"></canvas></div>
        </div>
        
        <div class="bento-box chart-box box-8" data-filter="day_of_week" onclick="handleFilterClick('day_of_week')">
            <h3><span>📅</span> ยอดขายตามวัน (Click) <span class="info-icon">🎯</span></h3>
            <div class="chart-container"><canvas id="dayChart"></canvas></div>
        </div>
        
        <div class="bento-box category-box box-9" data-filter="category" onclick="handleFilterClick('category')">
            <h3><span>📂</span> ยอดขายตามหมวดหมู่ (Click) <span class="info-icon">🎯</span></h3>
            <div class="chart-container"><canvas id="categoryChart"></canvas></div>
        </div>
        
        <div class="bento-box top-products box-10">
            <h3><span>🏆</span> Top 10 สินค้าขายดี</h3>
            <div class="product-list" id="topProductsList"></div>
        </div>
        
        <div class="bento-box box-1" data-kpi="13" onclick="showKPIModal(13)">
            <h3><span>👥</span> ลูกค้า <span class="info-icon">ℹ️</span></h3>
            <div class="customer-stats">
                <div class="cust-card new" onclick="toggleCustomerFilter('New');event.stopPropagation()">
                    <div class="value" id="new-cust-rate">-</div>
                    <div class="label">ลูกค้าใหม่</div>
                </div>
                <div class="cust-card return" onclick="toggleCustomerFilter('Returning');event.stopPropagation()">
                    <div class="value" id="ret-cust-rate">-</div>
                    <div class="label">ลูกค้าประจำ</div>
                </div>
            </div>
            <div style="margin-top:15px;">
                <div class="summary-item"><span class="label">ลูกค้าใหม่</span><span class="value" id="new-cust-count">-</span></div>
                <div class="summary-item"><span class="label">ลูกค้าประจำ</span><span class="value" id="ret-cust-count">-</span></div>
            </div>
        </div>
        
        <div class="bento-box box-2" data-kpi="18" onclick="showKPIModal(18)">
            <h3><span>⚡</span> Productivity <span class="info-icon">ℹ️</span></h3>
            <div class="summary-grid">
                <div class="summary-item"><span class="label">Items/Order</span><span class="value" id="items-per-order">-</span></div>
                <div class="summary-item"><span class="label">Peak Hour</span><span class="value" id="peak-hour">-</span></div>
            </div>
        </div>
        
        <div class="bento-box box-3" data-kpi="21" onclick="showKPIModal(21)">
            <h3><span>🔥</span> Hot vs Iced <span class="info-icon">ℹ️</span></h3>
            <div class="progress-bar"><div class="progress-fill pink" style="width:0%" id="hot-bar"></div></div>
            <div style="margin-top:8px;color:#fff;font-size:0.85rem;" id="hot-label">Hot: 0</div>
            <div class="progress-bar"><div class="progress-fill blue" style="width:0%" id="iced-bar"></div></div>
            <div style="margin-top:8px;color:#fff;font-size:0.85rem;" id="iced-label">Iced: 0</div>
        </div>
        
        <div class="bento-box box-4" data-kpi="22" onclick="showKPIModal(22)">
            <h3><span>📏</span> ขนาด <span class="info-icon">ℹ️</span></h3>
            <div class="summary-grid" id="size-grid"></div>
        </div>
        
        <div class="bento-box box-5" data-kpi="23" onclick="showKPIModal(23)">
            <h3><span>💳</span> การชำระเงิน <span class="info-icon">ℹ️</span></h3>
            <div class="chart-container" style="height:150px"><canvas id="paymentChart"></canvas></div>
        </div>
        
        <div class="bento-box box-6" data-kpi="11" onclick="showKPIModal(11)">
            <h3><span>🏷️</span> โปรโมชั่น <span class="info-icon">ℹ️</span></h3>
            <div class="summary-grid">
                <div class="summary-item"><span class="label">อัตราใช้โปรโมชั่น</span><span class="value" id="promo-rate">-</span></div>
                <div class="summary-item"><span class="label">คำสั่งซื้อที่ใช้</span><span class="value" id="promo-count">-</span></div>
                <div class="summary-item"><span class="label">มูลค่าส่วนลดรวม</span><span class="value" id="total-discount">-</span></div>
            </div>
        </div>
        
        <div class="bento-box chart-box box-7" data-filter="hour" onclick="handleFilterClick('hour')">
            <h3><span>⏱️</span> ยอดขายรายชั่วโมง (Click) <span class="info-icon">🎯</span></h3>
            <div class="chart-container"><canvas id="hourlyChart"></canvas></div>
        </div>
        
        <div class="bento-box box-8" data-kpi="25" onclick="showKPIModal(25)">
            <h3><span>➕</span> Add-on ยอดนิยม <span class="info-icon">ℹ️</span></h3>
            <div class="summary-grid" id="addon-grid"></div>
        </div>
    </div>
    
    <!-- KPI Modal -->
    <div class="modal" id="kpiModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">KPI Details</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="label">คำอธิบาย (สำหรับ CEO)</div>
                <div class="value" id="modalDesc"></div>
                <div class="label">วิธีการคำนวณ</div>
                <div class="calc" id="modalCalc"></div>
            </div>
        </div>
    </div>

    <!-- Filter Selection Modal -->
    <div class="modal" id="filterModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="filterModalTitle">เลือก Filter</h3>
                <button class="modal-close" onclick="closeFilterModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="filterOptions"></div>
            </div>
        </div>
    </div>

    <script>
        // KPI Data
        const kpiData = {
            1: { name: 'ยอดขายรวม (Total Revenue)', desc: 'รายได้รวมทั้งหมดจากการขาย', calc: 'SUM(net_sales_thb)' },
            2: { name: 'ยอดขายเฉลี่ยต่อออร์เดอร์ (AOV)', desc: 'มูลค่าการสั่งซื้อเฉลี่ยต่อครั้ง', calc: 'SUM(net_sales_thb) / COUNT(DISTINCT order_id)' },
            3: { name: 'จำนวนออร์เดอร์ (Total Orders)', desc: 'จำนวนคำสั่งซื้อทั้งหมด', calc: 'COUNT(DISTINCT order_id)' },
            4: { name: 'จำนวนสินค้าที่ขาย (Total Items)', desc: 'จำนวนรายการสินค้าที่ขายทั้งหมด', calc: 'SUM(qty)' },
            5: { name: 'ยอดขายต่อวัน (Daily Revenue)', desc: 'รายได้เฉลี่ยต่อวัน', calc: 'SUM(net_sales_thb) / COUNT(DISTINCT order_date)' },
            11: { name: 'อัตราการใช้โปรโมชั่น', desc: '% ออร์เดอร์ที่ใช้โปรโมชั่น', calc: 'COUNT(promo_flag=1) / COUNT(*) * 100' },
            13: { name: 'อัตราลูกค้าใหม่', desc: '% ลูกค้าใหม่', calc: 'COUNT(customer_type="New") / COUNT(*) * 100' },
            18: { name: 'Items per Order', desc: 'จำนวนรายการเฉลี่ยต่อออร์เดอร์', calc: 'SUM(qty) / COUNT(order_id)' },
            21: { name: 'Hot vs Iced Ratio', desc: 'สัดส่วนร้อน/เย็น', calc: 'COUNT(hot_iced="Hot") / COUNT(hot_iced="Iced")' },
            22: { name: 'Size Distribution', desc: 'สัดส่วนขนาด S/M/L', calc: 'COUNT(size) GROUP BY size' },
            23: { name: 'Payment Method Mix', desc: 'สัดส่วนวิธีการชำระเงิน', calc: 'COUNT(payment_method) GROUP BY payment_method' },
            25: { name: 'Top Add-ons', desc: 'Add-on ที่ขายดี', calc: 'COUNT(add_on) GROUP BY add_on' }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                if (jsonData.length > 0) {
                    // Transform data to match expected format
                    allData = jsonData.map(row => ({
                        order_id: row.order_id || row.Order_ID || '',
                        order_date: row.order_date || row.Order_Date || row.orderDate || '',
                        day_of_week: row.day_of_week || row.Day_of_Week || row.dayOfWeek || '',
                        hour: parseInt(row.hour || row.Hour || 0),
                        time_slot: row.time_slot || row.Time_Slot || row.timeSlot || '',
                        menu_item: row.menu_item || row.Menu_Item || row.menuItem || '',
                        category: row.category || row.Category || '',
                        hot_iced: row.hot_iced || row.Hot_Iced || row.hotIced || '',
                        size: row.size || row.Size || '',
                        qty: parseInt(row.qty || row.Qty || row.quantity || row.Quantity || 0),

                        discount_thb: parseFloat(row.discount_thb || row.Discount || row.discount || 0),

            const hourRev = {};
            data.forEach(d => { hourRev[d.hour] = (hourRev[d.hour] || 0) + d.net_sales_thb; });
            const peakHour = Object.entries(hourRev).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('items-per-order').textContent = itemsPerOrder.toFixed(2);
            document.getElementById('peak-hour').textContent = peakHour ? peakHour[0] + ':00' : '-';
            
            // Hot/Iced
            const hot = data.filter(d => d.hot_iced === 'Hot').length;
            const iced = data.filter(d => d.hot_iced === 'Iced').length;
            const hotPct = data.length ? hot / data.length * 100 : 0;
            const icedPct = data.length ? iced / data.length * 100 : 0;
            document.getElementById('hot-bar').style.width = hotPct + '%';
            document.getElementById('iced-bar').style.width = icedPct + '%';
            document.getElementById('hot-label').textContent = `Hot: ${hot} (${hotPct.toFixed(1)}%)`;
            document.getElementById('iced-label').textContent = `Iced: ${iced} (${icedPct.toFixed(1)}%)`;
            
            // Promo
            const promoCount = data.filter(d => d.promo_flag === 1).length;
            const promoRate = data.length ? promoCount / data.length * 100 : 0;
            const totalDiscount = data.reduce((s, d) => s + d.discount_thb, 0);
            document.getElementById('promo-rate').textContent = promoRate.toFixed(2) + '%';
            document.getElementById('promo-count').textContent = promoCount;
            document.getElementById('total-discount').textContent = '฿' + totalDiscount.toLocaleString();
            
            updateCharts(data);
            updateTopProducts(data);
            updateSizeGrid(data);
            updateAddonGrid(data);
            updateFilterBar();
        }

        function updateFilterBar() {
            const container = document.getElementById('activeFilters');
            container.innerHTML = '';
            let hasFilters = false;
            Object.entries(filters).forEach(([key, value]) => {
                if (value) {
                    hasFilters = true;
                    const tag = document.createElement('div');
                    tag.className = 'filter-tag';
                    tag.innerHTML = `${key}: ${value} <span class="remove" onclick="removeFilter('${key}')">×</span>`;
                    container.appendChild(tag);
                }
            });
            
            document.querySelectorAll('[data-filter]').forEach(box => {
                const filterType = box.dataset.filter;
                if (filters[filterType]) box.classList.add('filter-active');
                else box.classList.remove('filter-active');
            });
        }

        function removeFilter(key) {
            filters[key] = null;
            updateDashboard();
        }

        function clearAllFilters() {
            filters = { time_slot: null, channel: null, day_of_week: null, category: null, hour: null, customer_type: null };
            updateDashboard();
        }

        function toggleCustomerFilter(type) {
            filters.customer_type = filters.customer_type === type ? null : type;
            updateDashboard();
        }

        function handleFilterClick(filterType) {
            currentFilterType = filterType;
            const data = getFilteredData();
            
            // Get unique values for this filter
            const uniqueValues = [...new Set(data.map(d => d[filterType]))].filter(v => v).sort();
            
            document.getElementById('filterModalTitle').textContent = 'เลือก ' + filterType;
            
            const optionsDiv = document.getElementById('filterOptions');
            optionsDiv.innerHTML = '';
            
            // Add "All" option
            const allBtn = document.createElement('div');
            allBtn.className = 'filter-tag';
            allBtn.style.marginBottom = '10px';
            allBtn.style.background = filters[filterType] ? 'rgba(255,255,255,0.1)' : 'rgba(233,69,96,0.5)';
            allBtn.textContent = '🔄 ทั้งหมด (Clear Filter)';
            allBtn.onclick = () => { filters[filterType] = null; closeFilterModal(); updateDashboard(); };
            optionsDiv.appendChild(allBtn);
            
            uniqueValues.forEach(value => {
                const btn = document.createElement('div');
                btn.className = 'filter-tag';
                btn.style.marginBottom = '10px';
                btn.style.background = filters[filterType] === value ? 'rgba(233,69,96,0.5)' : 'rgba(255,255,255,0.1)';
                btn.textContent = value;
                btn.onclick = () => { filters[filterType] = value; closeFilterModal(); updateDashboard(); };
                optionsDiv.appendChild(btn);
            });
            
            document.getElementById('filterModal').classList.add('active');
        }

        function closeFilterModal() {
            document.getElementById('filterModal').classList.remove('active');
        }

        function updateTopProducts(data) {
            const products = {};
            data.forEach(d => { products[d.menu_item] = (products[d.menu_item] || 0) + d.qty; });
            const top10 = Object.entries(products).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const container = document.getElementById('topProductsList');
            container.innerHTML = top10.map(([name, qty], i) => `
                <div class="product-item">
                    <div class="product-rank">${i + 1}</div>
                    <div class="product-name">${name}</div>
                    <div class="product-qty">${qty}</div>
                </div>
            `).join('');
        }

        function updateSizeGrid(data) {
            const sizes = {};
            data.forEach(d => { if (d.size && d.size !== '-') sizes[d.size] = (sizes[d.size] || 0) + 1; });
            document.getElementById('size-grid').innerHTML = Object.entries(sizes).map(([size, count]) => 
                `<div class="summary-item"><span class="label">Size ${size}</span><span class="value">${count}</span></div>`
            ).join('');
        }

        function updateAddonGrid(data) {
            const addons = {};
            data.forEach(d => { if (d.add_on && d.add_on !== 'None') addons[d.add_on] = (addons[d.add_on] || 0) + 1; });
            document.getElementById('addon-grid').innerHTML = Object.entries(addons).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([name, count]) => 
                `<div class="summary-item"><span class="label">${name}</span><span class="value">${count}</span></div>`
            ).join('');
        }

        function initCharts() {
            const chartColors = ['#e94560', '#00d9ff', '#ffd93d', '#6bcb77', '#a855f7'];
            const hourColors = ['#e94560', '#ff6b6b', '#ff8585', '#ffd93d', '#ffed4a', '#a0a0a0', '#6bcb77', '#96e6a1', '#00d9ff'];

            charts.timeSlot = new Chart(document.getElementById('timeSlotChart'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: chartColors, borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff', font: { size: 11 } } } } }
            });

            charts.channel = new Chart(document.getElementById('channelChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Revenue (฿)', data: [], backgroundColor: chartColors.slice(0,3), borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#a0a0a0' }, grid: { display: false } }, y: { ticks: { color: '#a0a0a0' }, grid: { color: 'rgba(255,255,255,0.1)' } } } }
            });

            charts.day = new Chart(document.getElementById('dayChart'), {
                type: 'line',
                data: { labels: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'], datasets: [{ label: 'Revenue (฿)', data: [], borderColor: '#e94560', backgroundColor: 'rgba(233, 69, 96, 0.2)', fill: true, tension: 0.4, pointBackgroundColor: '#e94560' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#a0a0a0' }, grid: { display: false } }, y: { ticks: { color: '#a0a0a0' }, grid: { color: 'rgba(255,255,255,0.1)' } } } }
            });

            charts.category = new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Revenue (฿)', data: [], backgroundColor: chartColors, borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#a0a0a0' }, grid: { color: 'rgba(255,255,255,0.1)' } }, y: { ticks: { color: '#a0a0a0' }, grid: { display: false } } } }
            });

            charts.payment = new Chart(document.getElementById('paymentChart'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#00d9ff', '#ffd93d', '#6bcb77'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff', font: { size: 10 } } } } }
            });

            charts.hourly = new Chart(document.getElementById('hourlyChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Revenue (฿)', data: [], backgroundColor: hourColors, borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#a0a0a0', font: { size: 10 } }, grid: { display: false } }, y: { ticks: { color: '#a0a0a0' }, grid: { color: 'rgba(255,255,255,0.1)' } } } }
            });
        }

        function updateCharts(data) {
            // Time Slot
            const timeSlotData = {};
            data.forEach(d => { timeSlotData[d.time_slot] = (timeSlotData[d.time_slot] || 0) + d.net_sales_thb; });
            charts.timeSlot.data.labels = Object.keys(timeSlotData);
            charts.timeSlot.data.datasets[0].data = Object.values(timeSlotData);
            charts.timeSlot.update();

            // Channel
            const channelData = {};
            data.forEach(d => { channelData[d.channel] = (channelData[d.channel] || 0) + d.net_sales_thb; });
            charts.channel.data.labels = Object.keys(channelData);
            charts.channel.data.datasets[0].data = Object.values(channelData);
            charts.channel.update();

            // Day
            const dayOrder = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dayData = {};
            data.forEach(d => { dayData[d.day_of_week] = (dayData[d.day_of_week] || 0) + d.net_sales_thb; });
            charts.day.data.datasets[0].data = dayOrder.map(d => dayData[d] || 0);
            charts.day.update();

            // Category
            const catData = {};
            data.forEach(d => { catData[d.category] = (catData[d.category] || 0) + d.net_sales_thb; });
            charts.category.data.labels = Object.keys(catData);
            charts.category.data.datasets[0].data = Object.values(catData);
            charts.category.update();

            // Payment
            const payData = {};
            data.forEach(d => { payData[d.payment_method] = (payData[d.payment_method] || 0) + 1; });
            charts.payment.data.labels = Object.keys(payData);
            charts.payment.data.datasets[0].data = Object.values(payData);
            charts.payment.update();

            // Hourly
            const hourData = {};
            data.forEach(d => { hourData[d.hour] = (hourData[d.hour] || 0) + d.net_sales_thb; });
            const hours = [8, 9, 10, 11, 12, 13, 14, 15, 16];
            charts.hourly.data.labels = hours.map(h => h + ':00');
            charts.hourly.data.datasets[0].data = hours.map(h => hourData[h] || 0);
            charts.hourly.update();
        }

        // Modal Functions
        function showKPIModal(kpiId) {
            const kpi = kpiData[kpiId];
            if (!kpi) return;
            document.getElementById('modalTitle').textContent = kpi.name;
            document.getElementById('modalDesc').textContent = kpi.desc;
            document.getElementById('modalCalc').textContent = kpi.calc;
            document.getElementById('kpiModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('kpiModal').classList.remove('active');
        }

        document.getElementById('kpiModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize
        loadData();
    </script>
</body>
</html>
